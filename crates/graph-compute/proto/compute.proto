syntax = "proto3";
package graph_compute;

import "google/protobuf/struct.proto";

service Compute {
  rpc Subscribe(SubscribeRequest) returns (stream PositionDelta);
  rpc Health(HealthRequest) returns (HealthResponse);

  // Topological-fisheye view (Gansner, Koren, North — IEEE InfoVis 2004).
  // Bidirectional stream: the client sends FocusRequests as the user moves
  // the focal node, and the server emits a fresh HybridFrame for each.
  // The expensive multilevel hierarchy is built lazily on the first request
  // and cached for the lifetime of the connection.
  rpc TopoFisheye(stream FocusRequest) returns (stream HybridFrame);

  // Distributed BSP halo exchange (docs/compute-architecture.md §4, step c).
  // A peer worker streams the boundary HaloDeltas it owns for each superstep;
  // this worker replies, per inbound frame, with the boundary HaloDeltas IT
  // owns and the peer needs for that same frame. This is the real network
  // transport behind the `HaloTransport` trait seam — `TonicHaloTransport`
  // drives the client end, `LocalTransport` stays the single-process double.
  rpc ExchangeHalo(stream HaloDelta) returns (stream HaloDelta);
}

message SubscribeRequest {
  string graph_id = 1;
  // ADR-002: registry key, e.g. "fa2-brute", "cpu-spring". Empty ⇒ the
  // server's default engine (EngineRegistry::default_id()).
  string layout_id = 2;
  // ADR-002: dynamic engine settings carried as google.protobuf.Struct
  // (protobuf's native JSON-shaped type). Empty/absent ⇒ engine defaults.
  // Maps directly to/from serde_json::Value on the Rust side, so the one
  // serde settings struct per engine stays the single source of truth.
  google.protobuf.Struct params = 3;
}

message PositionDelta {
  uint64 frame = 1;
  // raw little-endian f32 [x0,y0,z0,x1,y1,z1,...]
  bytes positions = 2;
  uint32 n_nodes = 3;
}

// Boundary-position exchange payload for the distributed BSP model
// (docs/compute-architecture.md §4). A labeled generalization of
// PositionDelta: only the subset of boundary nodes a peer needs.
message HaloDelta {
  uint64 frame = 1;
  uint32 owner_id = 2;           // partition id that owns these nodes
  bytes  node_ids  = 3;          // raw little-endian u32 global ids
  bytes  positions = 4;          // raw little-endian f32 [x0,y0,z0,...], parallel to node_ids
}

message HealthRequest {}
message HealthResponse {
  bool ok = 1;
  uint32 n_nodes = 2;
  uint64 frame = 3;
}

// Knobs for the §4 coarsening pass. All fields optional; zero/empty means
// "use the server default" (see CoarsenParams::default() on the Rust side).
message CoarsenSettings {
  uint32 max_levels  = 1;
  uint32 target_size = 2;
  uint32 gt_max_hops = 3;
  float w_proximity     = 4;
  float w_size          = 5;
  float w_connection    = 6;
  float w_neighborhood  = 7;
  float w_degree        = 8;
}

// One message per focus update on the client → server half of the
// TopoFisheye stream. After the first message in a stream, only
// `focal_node`, `capacities`, and `alpha` are honoured; `coarsen` is fixed
// for the lifetime of the stream because the hierarchy is built once.
message FocusRequest {
  string graph_id = 1;
  uint32 focal_node = 2;
  // Paper §5 level capacities c_0, c_1, …. Empty = server default
  // (c_0 = 64, doubling).
  repeated uint32 capacities = 3;
  // Paper §6 distortion exponent α. 0 disables distortion; 1 targets
  // uniform density; >1 over-emphasises the focus.
  float alpha = 4;
  CoarsenSettings coarsen = 5;
}

// One message per server → client emission.
message HybridFrame {
  uint32 n_nodes = 1;
  // Per node: (level, idx_at_level) packed as two little-endian u32s.
  // Length = 8 * n_nodes bytes.
  bytes node_refs = 2;
  // Per node level (= the first u32 of each node_refs entry, broken out
  // for fast colour upload). Length = 4 * n_nodes bytes.
  bytes node_levels = 3;
  // Interleaved x,y,z f32 little-endian. Length = 12 * n_nodes bytes.
  bytes positions = 4;
  // Flat undirected edge pairs as little-endian u32. Length = 8 * n_edges.
  bytes edges = 5;
  // Per-edge level (max of the two endpoint levels). Length = 4 * n_edges.
  bytes edge_levels = 6;
  uint32 n_edges = 7;
}
