<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bevy 2D Shapes Example</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #222;
            max-width: 100%;
            max-height: 100%;
        }
        #loading {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
            padding: 10px;
            background-color: #444;
            border-radius: 5px;
        }
        .controls label {
            margin-right: 5px;
        }
        .controls input {
            margin-right: 15px;
            width: 60px;
        }
        .controls button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Graph Renderer...</div>
    <div class="controls" style="display: none;"> <!-- Initially hidden until WASM loads -->
        <label for="nodes">Nodes:</label>
        <input type="number" id="nodes" value="10" min="1">
        <label for="edges">Edges:</label>
        <input type="number" id="edges" value="15" min="0">
        <button id="regenerate">Regenerate Graph</button>
    </div>
    <script type="module">
        import init, { trigger_regeneration } from './pkg/rust-graph-renderer.js'; // Changed to trigger_regeneration
        
        async function start() {
            try {
                const wasm = await init(); // wasm object might not be needed if trigger_regeneration is global
                document.getElementById('loading').style.display = 'none';
                document.querySelector('.controls').style.display = 'block'; // Show controls

                const regenerateButton = document.getElementById('regenerate');
                const nodesInput = document.getElementById('nodes');
                const edgesInput = document.getElementById('edges');

                regenerateButton.addEventListener('click', () => {
                    const numNodes = parseInt(nodesInput.value, 10);
                    const numEdges = parseInt(edgesInput.value, 10);

                    if (isNaN(numNodes) || numNodes < 1 || isNaN(numEdges) || numEdges < 0) {
                        alert("Please enter valid numbers for nodes (>=1) and edges (>=0).");
                        return;
                    }
                    
                    // Check if the Rust function is available
                    if (typeof trigger_regeneration === 'function') {
                        console.log(numNodes, numEdges);
                        trigger_regeneration(numNodes, numEdges);
                    } else {
                        console.error("trigger_regeneration function not found in WASM module.");
                        alert("Error: Could not communicate with the graph renderer.");
                    }
                });

            } catch (e) {
                console.error("Error initializing WASM:", e);
                document.getElementById('loading').textContent = 'Error loading WASM: ' + e.message;
            }
        }
        
        start();
    </script>
</body>
</html>
