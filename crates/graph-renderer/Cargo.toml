[package]
name = "graph-renderer"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy       = { version = "0.16", default-features = false, features = [
    "bevy_asset", "bevy_color", "bevy_core_pipeline", "bevy_pbr",
    "bevy_render", "bevy_sprite", "bevy_text", "bevy_ui", "bevy_winit",
    "default_font", "x11", "wayland", "tonemapping_luts",
] }
bevy_image = "0.16"
rand       = { workspace = true }
wasm-bindgen = { workspace = true }
lazy_static  = "1.4"
graph-layouts = { path = "../graph-layouts" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["Document", "Window", "Element", "Crypto"] }
console_error_panic_hook = "0.1"
getrandom = { version = "0.3.3", features = ["wasm_js"] }
