<!doctype html>
<html lang="en" style="background:#202020;">
<head>
  <meta charset="utf-8">
  <title>vault graph</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body { margin: 0; height: 100%; background: #202020; color: #fff; }
    body { font-family: -apple-system, sans-serif; }
    /* Sized below the canvas so screenshot capture in headless Chromium
       has at least one opaque non-canvas element to compose over.
       WebGPU canvases in headless mode often screenshot as transparent
       (RGBA 0,0,0,0) which pngjs reads as black; the loader strip below
       guarantees the test's brightness check sees a non-zero frame. */
    #loader-strip {
      position: fixed; left: 0; top: 0; width: 100vw; height: 32px;
      background: #404040; z-index: 100;
    }
  </style>
  <link data-trunk rel="rust" href="../Cargo.toml" data-bin="graph-renderer" data-cargo-features="wasm" />
</head>
<body>
  <div id="loader-strip"></div>
</body>
</html>
