<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>vault graph</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="container">
    <aside id="sidebar">
      <div id="stats" class="section"></div>

      <div class="section">
        <label class="lbl">Search</label>
        <div class="row">
          <input id="search" class="input" type="search" placeholder="search…" autocomplete="off">
          <button id="regex-toggle" class="btn small" title="Regex mode (client-side)">.*</button>
        </div>
        <label class="lbl">Include</label>
        <input id="include" class="input" type="search" placeholder="must match…" autocomplete="off">
        <label class="lbl">Exclude</label>
        <input id="exclude" class="input" type="search" placeholder="exclude…" autocomplete="off">
      </div>

      <div class="section">
        <label class="lbl" for="size-by">Size by</label>
        <select id="size-by" class="input">
          <option value="degree">degree</option>
          <option value="indegree">indegree</option>
          <option value="outdegree">outdegree</option>
          <option value="pagerank">pagerank</option>
          <option value="betweenness">betweenness</option>
          <option value="kcore">kcore</option>
        </select>
        <label class="lbl" for="size-mul">Size mul: <span id="size-mul-val">1.00</span></label>
        <input id="size-mul" class="slider" type="range" min="0.25" max="4" step="0.05" value="1">
      </div>

      <div class="section">
        <label class="lbl" for="color-by">Color by</label>
        <select id="color-by" class="input">
          <option value="community">community</option>
          <option value="wcc">wcc</option>
          <option value="folder">folder</option>
          <option value="indegree">indegree</option>
          <option value="kcore">kcore</option>
        </select>
      </div>

      <div class="section">
        <label class="lbl">Simulation</label>
        <div class="row btn-group">
          <button class="btn sim-preset" data-preset="fast">Fast</button>
          <button class="btn sim-preset active" data-preset="balanced">Balanced</button>
          <button class="btn sim-preset" data-preset="pretty">Pretty</button>
        </div>
      </div>

      <div class="section">
        <label class="lbl">Camera</label>
        <div class="row btn-group">
          <button id="cam-fit" class="btn">Fit</button>
          <button id="cam-reset" class="btn">Reset zoom</button>
        </div>
      </div>

      <div class="section">
        <label class="lbl">Microscope focus</label>
        <label class="lbl" for="focus-z">Plane Z: <span id="focus-z-val">0</span></label>
        <input id="focus-z" class="slider" type="range" min="-1000" max="1000" step="10" value="0">
        <label class="lbl" for="focus-thickness">Thickness: <span id="focus-thickness-val">2000</span></label>
        <input id="focus-thickness" class="slider" type="range" min="50" max="3000" step="50" value="2000">
      </div>

      <div class="section">
        <label class="lbl">Cursor force tool</label>
        <label class="lbl" for="cursor-radius">Radius: <span id="cursor-radius-val">120</span></label>
        <input id="cursor-radius" class="slider" type="range" min="0" max="500" step="10" value="120">
        <label class="lbl" for="cursor-strength">Strength: <span id="cursor-strength-val">200</span></label>
        <input id="cursor-strength" class="slider" type="range" min="0" max="2000" step="10" value="200">
        <label class="lbl" for="cursor-depth">Depth: <span id="cursor-depth-val">800</span></label>
        <input id="cursor-depth" class="slider" type="range" min="100" max="3000" step="10" value="800">
        <div class="lbl" style="opacity:0.7">LMB attract · RMB repel · scroll = depth</div>
      </div>
    </aside>

    <div id="canvas-wrap">
      <canvas id="cosmos"></canvas>
    </div>

    <div id="modal" class="hidden"></div>
    <div id="cheatsheet">
      <div class="ch-row"><kbd>WASD</kbd><span>pan</span></div>
      <div class="ch-row"><kbd>QE</kbd><span>up / down</span></div>
      <div class="ch-row"><kbd>RF</kbd><span>forward / back</span></div>
      <div class="ch-row"><kbd>drag</kbd><span>rotate</span></div>
      <div class="ch-row"><kbd>scroll</kbd><span>zoom</span></div>
      <div class="ch-row"><kbd>Space</kbd><span>fit all</span></div>
      <div class="ch-row"><kbd>Esc</kbd><span>close / clear</span></div>
      <div class="ch-row"><kbd>?</kbd><span>toggle help</span></div>
    </div>
  </div>
  <script type="module" src="/assets/main.js"></script>
</body>
</html>
