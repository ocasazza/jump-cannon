generate:
  editor:
    source: |
      # Vesicle (rim seam + curvature) — initial particle soup for the dynamic-bonding engine.
      # Evaluate to spawn 256 unbonded particles; the Geometric (GPU)
      # engine grows bonds at runtime into the target morphology.
      let
        g  = import /jc/src/graph.nix {};
        gc = import /jc/src/graph-combinators.nix { graph = g; };
      in
        g.toGraphJSON (gc.soupGen { nodes = 256; prefix = "s"; })
  backend: Auto
seed:
  strategy: !BuiltIn 2
  editor:
    source: |
      # Axis-aligned cubic lattice, side = ceil(cbrt n).
      let s = import /jc/src/seed.nix {};
      in s.grid { inherit n; spacing = 60.0; }
