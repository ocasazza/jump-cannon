syntax = "proto3";
package jumpcannon.graph;

// Manifest sent on /graph/init. Tiny — just metadata for setup.
message Init {
  uint32 n_nodes = 1;
  uint32 n_edges = 2;
  uint32 num_communities = 3;
  uint32 num_wcc = 4;
  // Color palette as flat r,g,b,r,g,b,... (3 floats per color).
  // Future: clients pass color preferences; server returns derived palette.
  repeated float palette = 5 [packed=true];
}

// Per-node metadata. Returned by /node/:id (sparse, on-demand).
message NodeMeta {
  string id = 1;
  string title = 2;
  string path = 3;
  string folder = 4;
  optional string doctype = 5;
  repeated string tags = 6;
  // Frontmatter as JSON-encoded string. Keeping this opaque avoids re-encoding
  // arbitrary YAML in protobuf — frontends parse JSON.
  string frontmatter_json = 7;

  uint32 degree = 10;
  uint32 indegree = 11;
  uint32 outdegree = 12;
  float pagerank = 13;
  float betweenness = 14;
  uint32 kcore = 15;
  uint32 community = 16;
  uint32 wcc = 17;

  // Full markdown body of the note (frontmatter stripped). Lazily read
  // from disk on each `/node/:id` request — we don't pre-load every
  // body into memory because a 10k-node vault would balloon the
  // server's RSS. Empty for external nodes (no corresponding file) or
  // when the read fails. Frontmatter is *not* duplicated here; it
  // lives in `frontmatter_json` (field 7).
  string body = 18;
}

// Search response. Returned by /search?q=…
message SearchResults {
  repeated string ids = 1;
  uint32 total = 2;
}

// Per-field inverted index. Returned by /graph/meta_summary.
// `fields[i]` names a field; each `FieldBucket.field_idx` indexes into it.
message MetaSummary {
  repeated string fields = 1;
  repeated FieldBucket buckets = 2;
}

message FieldBucket {
  uint32 field_idx = 1;
  string value = 2;
  repeated uint32 node_idx = 3 [packed=true];
}
