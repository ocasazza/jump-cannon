[workspace]
name = "jump-cannon"
# Default provider for agents that don't override. See [providers.*] below.
provider = "litellm-local"

[daemon]
patrol_interval = "30s"
max_restarts    = 5
restart_window  = "1h"
shutdown_timeout = "5s"
formula_v2 = true

# ── Providers ────────────────────────────────────────────────────────────────
# Both providers route through LiteLLM on desk-nxst-001 (port 4000).
# OPENAI_API_KEY must be set before `gc supervisor start`:
#
#   export OPENAI_API_KEY=$(cat /run/litellm-oci/keys/gascity)
#
# The `local-coder` model group auto-routes to whatever local node is live
# (weight-balanced: desk-nxst-001 ×10, gfr-osx26-{02,03} ×3, laptop ×1,
# with 60-second cooldown quarantine on failure).
#
# `qwen3-coder-desk-nxst-001` pins exclusively to the local vLLM instance
# (RTX 3090Ti + 4000 SFF Ada, tensor-parallel). Use for agents that need
# consistent latency or large-context work.

# litellm-local — auto-routes to best available compute.
[providers.litellm-local]
base = "codex"
env  = { OPENAI_BASE_URL = "http://localhost:4000/v1" }

# litellm-pinned — always lands on desk-nxst-001's vLLM.
[providers.litellm-pinned]
base = "codex"
env  = { OPENAI_BASE_URL = "http://localhost:4000/v1" }
