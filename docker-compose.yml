services:
  graph-api:
    depends_on:
    - graph-compute
    environment:
      GRAPH_API_HOST: 0.0.0.0
      GRAPH_API_NO_BROWSER: '1'
      GRAPH_API_PORT: '8765'
      GRAPH_RENDERER_ASSETS_DIR: /assets
      JUMP_CANNON_COMPUTE_URL: http://graph-compute:50051
      RUST_LOG: info
      VAULT_ROOT: /vault
    image: graph-api:latest
    ports:
    - 8765:8765
    restart: unless-stopped
    volumes:
    - ${VAULT_ROOT:-./vault}:/vault:rw
    - ${ASSETS_DIR:-./crates/graph-renderer/assets/dist}:/assets:ro
  graph-compute:
    environment:
      GRAPH_COMPUTE_ADDR: '[::]:50051'
      GRAPH_COMPUTE_TICK_HZ: '30'
      RUST_LOG: info
    image: graph-compute:latest
    ports:
    - 50051:50051
    restart: unless-stopped
