# Trunk drives the Dioxus crate (ui/) to WASM. Lives at the workspace root —
# trunk needs a Trunk.toml in its cwd to resolve the target crate from the
# index.html rust link rather than the (virtual) workspace manifest; both the
# crane derivation (nix build .#app-web) and `cargo tauri dev` run trunk here.
#
# Port 8081 so it can run alongside apple-notes-ocr-flow (8080).
[build]
target = "ui/index.html"
dist = "ui/dist"
# Stable asset names: app/ui spawns the tvix-worker bundle at the fixed URL
# /tvix-worker.js (see ui/src/worker.rs) — a content hash in the filename
# would break that. Same trade the egui-era root Trunk.toml made.
filehash = false

# Watch the path dependencies too — trunk's default only covers the bin
# crate's directory, so graph-layouts edits otherwise never trigger a
# rebuild and the dev server serves stale wasm. (panel-kit is a git
# dependency now; when developing it locally via [patch], add its checkout
# here too.)
[watch]
watch = ["ui", "tvix-worker", "../crates/graph-layouts", "../crates/tvix-wasm"]

[serve]
port = 8081
