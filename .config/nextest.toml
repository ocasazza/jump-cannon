[profile.default]
fail-fast = false

[profile.ci]
fail-fast = true
retries = 2
test-threads = 4

# Unit tests: fast, no I/O
[profile.unit]
fail-fast = false
default-filter = "test(/unit::/ | package(tvix-wasm) | package(vault-search))"

# Integration tests: may do file I/O
[profile.integration]
fail-fast = false
test-threads = 2
default-filter = "test(/integration::/)"

# E2E tests: headless Bevy, slower
[profile.e2e]
fail-fast = false
test-threads = 1
default-filter = "test(/e2e::/)"

# GPU analytics correctness: the gpu_pagerank_* suites + gpu_engines. Needs a
# wgpu adapter — real Metal on the darwin builder, or lavapipe software-Vulkan
# in the Linux sandbox (VK_ICD_FILENAMES). The `tests-gpu` crane check runs this
# profile with GPU_PAGERANK_REQUIRE_ADAPTER=1 so a missing adapter fails loudly
# instead of silently skipping. Single-threaded: one GPU device, avoid contention.
#
# NOTE: `default-filter` is the correct key (the older `filter` key is silently
# ignored by nextest); all profiles here now use it so they actually scope.
[profile.gpu]
fail-fast = false
test-threads = 1
default-filter = "binary(/gpu_/)"
