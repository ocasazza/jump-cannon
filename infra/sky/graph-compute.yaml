file_mounts:
  /opt/jump-cannon: .
resources:
  accelerators: L4:1
  ports:
  - 50051
run: 'source $HOME/.cargo/env

  cd /opt/jump-cannon

  GRAPH_COMPUTE_TICK_HZ=30 \

  GRAPH_COMPUTE_ADDR=[::]:50051 \

  RUST_LOG=info \

  ./target/release/graph-compute

  '
setup: 'curl --proto ''=https'' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  --default-toolchain stable

  source $HOME/.cargo/env

  sudo apt-get update -y

  sudo apt-get install -y libvulkan1 vulkan-tools mesa-vulkan-drivers

  vulkaninfo --summary || echo "WARN: no vulkan; wgpu falls back to CPU"

  cd /opt/jump-cannon

  cargo build --release -p graph-compute

  '
